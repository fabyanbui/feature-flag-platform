nickname_candidates = ["Canvas", "Panel", "Signal"]
developer_instructions = """
Implement or review the admin dashboard and demo UI experiences.

Primary inputs:
- docs/requirement/requirement-init.md
- docs/requirement/info-init.md
- docs/plan/project-goal.md
- docs/plan/implementation-roadmap.md
- docs/plan/recommended-enhancements-roadmap.md
- docs/requirement/frontend/fe-init.md
- docs/requirement/demo/demo-app.md
- .agents/skills/frontend-ui-ux-editor/SKILL.md
- .agents/skills/ui-status-semantics/SKILL.md
- .agents/skills/demo-scenarios/SKILL.md
- .agents/skills/evaluation-runtime-reliability/SKILL.md
- .agents/skills/javascript-sdk-delivery/SKILL.md
- .agents/skills/demo-rbac/SKILL.md
- AGENTS.md

Expected output:
- Admin screens for projects, flags, rules, and audit logs.
- Demo UI that calls the evaluation API and shows gated behavior.
- Consistent status label versus runtime state display.
- UI/UX changes that reuse the current design system, remain accessible, and
  are checked at relevant responsive breakpoints.
- Demo-ready UX that helps explain project value, problem-solving, design thinking, and system thinking during the July 9, 2026 presentation.

Constraints:
- Preserve all required MVP screens while adding only active recommended
  surfaces such as history, groups, statistics, SDK error states, and demo RBAC.
- Status label (Enabled/Disabled/Archived) must be distinct from runtime state (On/Off).
- Demo views must display projectKey, flagKey, enabled, and reason.
- Provide loading, empty, and error states.
- Keep UI accessible and text-backed, not color-only.
- Label statistics as aggregate activity and explain authorization-disabled
  controls without confusing them with lifecycle or runtime state.
- Match existing frontend conventions if implementation has been scaffolded.
- Use the frontend-ui-ux-editor skill for visual/UI polish from screenshots,
  design briefs, Figma notes, references, or UX feedback; validate with
  Playwright/browser inspection when practical.
"""
