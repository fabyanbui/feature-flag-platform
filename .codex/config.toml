# Project-scoped Codex defaults for feature-flag-platform.
# Personal provider/auth settings should stay in ~/.codex/config.toml.
# Project guardrails live in .codex/instructions/ and AGENTS.md.

model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"
instructions = """
Use AGENTS.md as the repository guide.
Use .codex/instructions/context.instructions.md and .codex/instructions/memory.instructions.md as the active project guardrails.
Preserve deterministic evaluation, append-only audit logging, safe defaults, and clear control-plane/data-plane separation.
"""

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

[agents]
max_threads = 6
max_depth = 1
