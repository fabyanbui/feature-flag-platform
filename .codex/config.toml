# Project-scoped Codex defaults for feature-flag-platform.
# Personal provider/auth settings should stay in ~/.codex/config.toml.

model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "cached"

[agents]
max_threads = 6
max_depth = 1

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
# Set this environment variable to a least-privilege GitHub PAT before starting Codex.
bearer_token_env_var = "GITHUB_PAT_TOKEN"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.playwright.tools.browser_tabs]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_navigate]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_click]
approval_mode = "approve"

[mcp_servers.playwright.tools.browser_evaluate]
approval_mode = "approve"
